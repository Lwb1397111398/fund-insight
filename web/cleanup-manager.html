<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据清理管理 - Fund Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f7fa;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .cleanup-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .cleanup-card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-item .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-item .label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .rule-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .rule-box h3 {
            font-size: 14px;
            color: #1565c0;
            margin-bottom: 10px;
        }
        
        .rule-box ul {
            margin-left: 20px;
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .result-box.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result-box.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            display: none;
            z-index: 1000;
        }
        
        .message.success { background: #28a745; }
        .message.error { background: #dc3545; }
        .message.warning { background: #ffc107; color: #333; }
        
        .loading {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="ri-delete-bin-line"></i> 数据清理管理</h1>
        <p>管理过期预测和观点的自动清理</p>
    </div>

    <div class="cleanup-card">
        <h2><i class="ri-information-line"></i> 清理规则说明</h2>
        <div class="rule-box">
            <h3>自动清理规则</h3>
            <ul>
                <li><strong>预测</strong>：在目标日期（target_date）后保留7天，之后自动删除</li>
                <li><strong>观点</strong>：在有效期（valid_until）后保留7天，之后自动删除</li>
                <li><strong>帖子</strong>：当帖子中的所有预测被删除后，自动删除该帖子</li>
                <li><strong>定时任务</strong>：系统每天自动运行一次清理任务</li>
            </ul>
        </div>
    </div>

    <div class="cleanup-card">
        <h2><i class="ri-bar-chart-line"></i> 待清理数据统计</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="number" id="expired-predictions">-</div>
                <div class="label">待清理预测</div>
            </div>
            <div class="stat-item">
                <div class="number" id="expired-viewpoints">-</div>
                <div class="label">待清理观点</div>
            </div>
            <div class="stat-item">
                <div class="number" id="affected-posts">-</div>
                <div class="label">受影响帖子</div>
            </div>
        </div>
        <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
            <i class="ri-time-line"></i> 截止日期: <span id="cutoff-date">-</span>
        </p>
        <div class="toolbar">
            <button class="btn btn-secondary" onclick="loadStatus()">
                <i class="ri-refresh-line"></i> 刷新数据
            </button>
            <button class="btn btn-danger" onclick="runCleanup()" id="cleanup-btn">
                <i class="ri-delete-bin-line"></i> 立即执行清理
            </button>
        </div>
        <div id="result-box" class="result-box"></div>
    </div>

    <div id="message" class="message"></div>

    <script>
        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        async function loadStatus() {
            try {
                const res = await axios.get('/api/cleanup/status');
                if (res.data.success) {
                    const data = res.data.data;
                    document.getElementById('expired-predictions').textContent = data.expired_predictions || 0;
                    document.getElementById('expired-viewpoints').textContent = data.expired_viewpoints || 0;
                    document.getElementById('affected-posts').textContent = data.affected_posts || 0;
                    document.getElementById('cutoff-date').textContent = data.cutoff_date || '-';
                } else {
                    showMessage('获取状态失败: ' + res.data.message, 'error');
                }
            } catch (e) {
                console.error('获取状态失败:', e);
                showMessage('获取状态失败: ' + (e.response?.data?.message || e.message), 'error');
            }
        }

        async function runCleanup() {
            const btn = document.getElementById('cleanup-btn');
            const resultBox = document.getElementById('result-box');
            
            if (!confirm('确定要立即执行清理任务吗？\n\n这将删除所有过期的预测和观点，且无法恢复！')) {
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ri-loader-4-line loading"></i> 清理中...';
            resultBox.style.display = 'none';

            try {
                const res = await axios.post('/api/cleanup/run');
                
                if (res.data.success) {
                    const data = res.data.data;
                    const predictions = data.predictions || {};
                    const viewpoints = data.viewpoints || {};
                    
                    resultBox.className = 'result-box success';
                    resultBox.innerHTML = `
                        <h3><i class="ri-check-line"></i> 清理完成</h3>
                        <p><strong>预测清理：</strong>删除 ${predictions.deleted_predictions || 0} 个预测，清理 ${predictions.cleaned_posts || 0} 个空帖子</p>
                        <p><strong>观点清理：</strong>删除 ${viewpoints.deleted_viewpoints || 0} 个观点</p>
                    `;
                    resultBox.style.display = 'block';
                    showMessage('清理任务执行成功！', 'success');
                    
                    // 刷新状态
                    await loadStatus();
                } else {
                    resultBox.className = 'result-box error';
                    resultBox.innerHTML = `<h3><i class="ri-error-warning-line"></i> 清理失败</h3><p>${res.data.message}</p>`;
                    resultBox.style.display = 'block';
                    showMessage('清理失败: ' + res.data.message, 'error');
                }
            } catch (e) {
                console.error('清理失败:', e);
                resultBox.className = 'result-box error';
                resultBox.innerHTML = `<h3><i class="ri-error-warning-line"></i> 清理失败</h3><p>${e.response?.data?.message || e.message}</p>`;
                resultBox.style.display = 'block';
                showMessage('清理失败: ' + (e.response?.data?.message || e.message), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ri-delete-bin-line"></i> 立即执行清理';
            }
        }

        // 页面加载时获取状态
        window.onload = loadStatus;
    </script>
</body>
</html>
