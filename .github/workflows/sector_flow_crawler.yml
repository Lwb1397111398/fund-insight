name: Sector Flow Crawler

on:
  schedule:
    # 每个交易日 13:30 北京时间（05:30 UTC）
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/fetch_sector_flow.py

      # 如果 AkShare 失败，尝试重试一次
      - name: Retry on failure
        if: failure()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "首次抓取失败，等待 30 秒后重试..."
          sleep 30
          python scripts/fetch_sector_flow.py
