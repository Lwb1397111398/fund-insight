name: 板块资金流向数据抓取

on:
  schedule:
    # 每个交易日 15:30（北京时间）执行
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch-sector-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests sqlalchemy psycopg2-binary

      - name: 执行数据抓取
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/fetch_sector_flow.py
