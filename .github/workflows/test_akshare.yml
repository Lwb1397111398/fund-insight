name: Test AkShare Interfaces

# 手动触发测试
on:
  workflow_dispatch:

jobs:
  test-akshare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas

    - name: Run AkShare interface tests
      env:
        # 禁用 AkShare 缓存，确保每次都是最新数据
        AKSHARE_DISABLE_CACHE: "true"
      run: |
        python scripts/test_akshare_interfaces.py

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: akshare-test-results
        path: akshare_test_results.json
        retention-days: 7
