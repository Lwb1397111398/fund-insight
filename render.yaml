services:
  - type: web
    name: fund-insight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: CRAWLER_ENABLED
        value: "true"
      - key: ACCESS_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LLM_PROVIDER
        value: volcengine
      - key: VOLCENGINE_API_KEY
        sync: false
      - key: VOLCENGINE_BASE_URL
        value: "https://ark.cn-beijing.volces.com/api/v3"
      - key: VOLCENGINE_MODEL
        value: "ep-20260424143452-nhsrm"
      - key: VOLCENGINE_LIGHT_MODEL
        value: "ep-20260424143452-nhsrm"

databases:
  - name: fund-insight-db
    plan: free
