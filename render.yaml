services:
  - type: web
    name: fund-insight
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: CRAWLER_ENABLED
        value: "true"
      - key: ACCESS_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LLM_PROVIDER
        value: volcengine
      - key: VOLCENGINE_API_KEY
        sync: false
      - key: VOLCENGINE_BASE_URL
        value: "https://ark.cn-beijing.volces.com/api/v3"
      - key: VOLCENGINE_MODEL
        value: deepseek-v3-2-251201
      - key: VOLCENGINE_SEARCH_MODEL
        value: deepseek-v3-2-251201
      - key: VOLCENGINE_VISION_MODEL
        value: doubao-seed-2-0-pro-260215
      - key: VOLCENGINE_VISION_LITE_MODEL
        value: doubao-seed-2-0-lite-260215

databases:
  - name: fund-insight-db
    plan: free
