services:
  - type: web
    name: fund-insight
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CRAWLER_ENABLED
        value: false
      - key: PYTHON_VERSION
        value: 3.10.12
